<head>

  <title>8d Exercise</title>
  <style>

     .box3, button {
      display: block;
     }

     input, button {
      margin: 4px 1px;
     }

     .box1, .box2 {
      padding-left: 10px;
      padding-top: 10px;
      padding-bottom: 10px;
      width: 130px;
     }

     .box3 {
      padding-left: 10px;
      padding-top: 10px;
      padding-bottom: 10px;
      width: 282px;
     }

     button {
      padding: 12px 125px;
      margin: 8px 0;
      background-color: blue;
      border: none;
      color: white;
      border-radius: 6px;
      font-weight: bold;
     }
  </style>
</head>
<body>
    <input type="textbox" placeholder="First Name" class="box1">
    <input type="textbox" placeholder="Second Name" class="box2">

    <button>
