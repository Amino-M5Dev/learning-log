<!DOCTYPE html>
<html lang="en">
<head>
    <title>14e Exercise</title>
    <style>
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px;
        }

        .profile-card,
        .button-card {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-pic {
            width: 45px;
            border-radius: 30px;
            margin-right: 8px;
        }

        .profile-name {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }

        .add-friend-btn {
            padding: 4px 8px;
            border: none;
            background-color: rgb(0, 123, 255);
            color: white;
            border-radius:4px;
            font-weight: bold;
            margin-right: 8px;
        }

        .message-btn {
            padding: 4px 8px;
            border: none;
            border-radius:4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-card">
            <img class="profile-pic" src="./eren-icon.jpeg">
            <span class="profile-name">Eren Yeager</span>
        </div>
        <div class="button-card">
            <button class="add-friend-btn">Add Friend</button>
            <button class="message-btn">Message</button>
        </div>
    </div>

</body>
</html>
