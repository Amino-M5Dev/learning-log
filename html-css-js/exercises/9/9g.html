<!DOCTYPE html>
<html lang="en">
<head>
  <title>9g Exercise</title>
  <style>
    p {
      font-family: Arial;
      margin: 0;
    }
    img {
      width: 200px;
    }
    div {
      height: auto;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      border-radius: 5px;
      display: inline-block;
      margin: 5px;
    }
    .name {
      font-size: 14px;
      font-weight: bold;
      margin-top: 5px;
      margin-left: 5px;
    }
    .friends {
      font-size: 12px;
      margin-top: 5px;
      margin-left: 5px;
      color: rgb(88, 87, 87);
    }

    button {
      margin-top: 8px;
      margin-left: 5px;
      margin-bottom: 8px;
      padding: 6px 20px;
      background-color: rgb(0, 153, 255);
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div>
    <img src="oreki-icon.jpg">
    <p class="name">
      Oreki Houtarou
    </p>
    <p class="friends">
      2 mutual friends
    </p>
    <button>
      Add friend
    </button>
  </div>

  <div>
    <img src="senku-icon.jpeg">
    <p class="name">
      Senku
    </p>
    <p class="friends">
      3 mutual friends
    </p>
    <button>
      Add friend
    </button>
  </div>

  <div>
    <img src="eren-icon.jpeg">
    <p class="name">
      Eren Yeager
    </p>
    <p class="friends">
      4 mutual friends
    </p>
    <button>
      Add friend
    </button>
  </div>
  
</body>
</html>
