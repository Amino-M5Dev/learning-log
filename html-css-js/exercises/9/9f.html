<!DOCTYPE html>
<html lang="en">
<head>
  <title>9f Exercise</title>
  <style>
    p {
      font-family: Arial;
      margin: 0;
    }
    img {
      width: 200px;
    }
    div {
      height: auto;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      border-radius: 5px;
    }
    .name {
      font-weight: bold;
      margin-top: 5px;
      margin-left: 5px;
    }
    .friends {
      font-size: 13px;
      margin-top: 5px;
      margin-left: 5px;
      color: rgb(88, 87, 87);
    }

    button {
      margin-top: 8px;
      margin-left: 5px;
      margin-bottom: 8px;
      padding: 6px 20px;
      background-color: rgb(0, 153, 255);
      color: white;
      border: none;
      border-radius: 3px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div>
    <img src="oreki-icon.jpg">
    <p class="name">
      Oreki Houtarou
    </p>
    <p class="friends">
      2 mutual friends
    </p>
    <button>
      Add friend
    </button>
  </div>
  
</body>
</html>
