<!DOCTYPE html>
<html lang="en">
<head>
  <title>8c Exercise</title>
  <style>
    div {
      vertical-align: middle;
      margin: 0 auto;
      text-align: center;
      vertical-align: middle;
    }
    img {
      width: 200px;
      margin: 10px 160px;
      vertical-align: middle;
    }
    input {
      font-size: 18px;
      width: 500px;
      height: 40px;
      padding-left: 15px;
      border: none;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      border-radius: 20px;
      margin-bottom: 30px;
      margin-top: 10px;
    }
    button {
      vertical-align: middle;
      border: none;
      padding: 12px 12px;
      font-size: 15px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div>
    <div><img src="./google-logo.png"></div>
    <div>
      <input type="text" placeholder="Search Google or type a URL">
    </div>
    <div>
      <button>
      Google Search
    </button>
    <button>
      I'm Feeling Lucky
    </button>
    </div>
    
  </div>
</body>
</html>
