<!DOCTYPE html>
<html lang="en">
<head>
  <title>11d</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    p {
      font-family: Arial;
      margin-top: 0;
      margin-bottom: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 200px 200px 200px;
      column-gap: 20px;
    }

    .profile {
      width: 200px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
      vertical-align: top;
      margin-right: 15px;
    }

    .profile-picture {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      margin-left: 8px;
      margin-bottom: 5px;
    }

    .mutual-friends-row {
      display: grid;
      grid-template-columns: 35px 1fr;
      align-items: center;
      margin-left: 8px;
      margin-bottom: 10px;
    }

    .mutual-friend-picture {
      height: 28px;
      width: 28px;
      object-fit: cover;
      border-radius: 14px;
      vertical-align: middle;
      margin-right: 4px;
    }

    .mutual-friends {
      color: rgb(100, 100, 100);
    }

    .add-friend-button {
      background-color: rgb(24, 119, 242);
      color: white;
      border: none;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 20px;
      padding-right: 20px;
      border-radius: 4px;
      font-size: 16px;
      margin-left: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="grid">
    <div class="profile">
        <img class="profile-picture" src="./eren-icon.jpeg">
        <p class="name">
          Eren
        </p>
        <div class="mutual-friends-row">
          <img class="mutual-friend-picture" src="./spike-icon.jpeg">
          <p class="mutual-friends">
           2 mutual friends
          </p>
        </div>
        <button class="add-friend-button">
          Add Friend
        </button>
      </div>

      <div class="profile">
        <img class="profile-picture" src="./senku-icon.jpeg">
        <p class="name">
          Senku
        </p>
        <div class="mutual-friends-row">
          <img class="mutual-friend-picture" src="./spike-icon.jpeg">
          <p class="mutual-friends">
           3 mutual friends
          </p>
        </div>
        <button class="add-friend-button">
          Add Friend
        </button>
      </div>

      <div class="profile">
        <img class="profile-picture" src="./oreki-icon.jpg">
        <p class="name">
          oreki-icon
        </p>
        <div class="mutual-friends-row">
          <img class="mutual-friend-picture" src="./spike-icon.jpeg">
          <p class="mutual-friends">
           4 mutual friends
          </p>
        </div>
        <button class="add-friend-button">
          Add Friend
        </button>
      </div>
  </div>
  
</body>
</html>
