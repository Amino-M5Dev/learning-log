<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12e Exercise</title>
  <style>

    body {
      padding: 10px;
      margin: 0;
      font-family: Arial;
    }

    .header {
      background-color: rgb(122, 43, 197);
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      height: 55px;
    }

    .home {
      color: white;
      font-weight: bold;
      margin-left: 10px;
      width: 20px;
    }

    .search-box {
      width: 380px;
      padding: 5px;
      padding-left: 25px;
      border-radius: 20px;
      border: none;
    }

    .download-button {
      padding: 8px 20px;
      margin-right: 10px;
      background-color: rgba(0,0,0,0);
      border: 1px solid white;
      color: white;
    }
  </style>
</head>

<body>

  <div class="header">
    <p class="home">Home</p>
    <input class="search-box" type="textbox" placeholder="Search">
    <button class="download-button">Download</button>
  </div>

</body>
</html>
