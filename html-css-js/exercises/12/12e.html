<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12e Exercise</title>

  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial;
    }

    .container {
      width: 400px;
      padding: 5px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
    }

    .notification-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }

    p {
      margin: 0;
      font-size: 18px;
    }

    button {
      width: 40px;
      height: 30px;
      border: none;
      border-radius: 50px;
      background-color: rgb(0, 132, 255);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: rgb(0, 110, 220);
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="notification-row">
      <p>Home</p>
      <button>14</button>
    </div>

    <div class="notification-row">
      <p>Notifications</p>
      <button>3</button>
    </div>

    <div class="notification-row">
      <p>Messages</p>
      <button>5</button>
    </div>

  </div>
</body>
</html>
