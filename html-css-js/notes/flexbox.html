<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flexbox Practice</title>
</head>
<body style="padding-bottom: 100px;">

  <div style="
    display: flex;
    flex-direction: row;
    ">
    <div style="background-color: lightblue;">div 1 text</div>
    <div style="background-color: lightpink;">div 2 <p>Text</p></div>
  </div>

  <div style="
    margin-top: 30px;
    display: flex;
    flex-direction: row;
    ">
    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; flex: 1;">flex 1</div>
  </div>

  <div style="
    margin-top: 30px;
    display: flex;
    flex-direction: row;
    ">
    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; flex: 1;">flex 1</div>
    <div style="background-color: rgb(202, 255, 182); flex: 2;">flex 2</div>
  </div>

  <div style="
    margin-top: 30px;
    height: 70px;
    border: 1px solid black;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    ">
    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; width: 100px;">100px</div>
    <div style="background-color: rgb(202, 255, 182); width: 100px;">100px</div>
  </div>

  <div style="
    margin-top: 30px;
    height: 70px;
    border: 1px solid black;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    
    ">
    <div style="background-color: lightblue; width: 100px;">100px</div>
    <div style="background-color: lightpink; width: 100px;">100px</div>
    <div style="background-color: rgb(202, 255, 182); width: 100px;">100px</div>
  </div>

</body>
</html>
