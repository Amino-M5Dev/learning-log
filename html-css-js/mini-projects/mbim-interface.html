<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="./mbim.css">

<body>

        <div class="profile-menu">
          <p class="text">

      </div>
      <div class="money-info">

      <div class="sec-cards">

      </div>

      </div>
      <div class="move-info-card">
        <p class="data">
          Qua, 8 jul

          <img class="transfer-icon" src="./send-money.png">
          <p class="type">
            COMISSAO TRANSACAO EMOLA
          </p>
        </div>
        <div class="valor">
          <p class="valor-m">-30,<span class="valor-mod
            ">00 MZN</span></p>
        </div>
        <div class="transfer">
          <img class="transfer-icon" src="./send-money.png">
          <p class="type">
            TRF EMOLA 862715515 155394484

        </div>
        <div class="valor">
          <p class="valor-m">-100,<span class="valor-mod

          <p class="valor-m">-385,<span class="valor-mod

        </div>
        <div class="transfer">
          <img class="transfer-icon" src="./send-money.png">
          <p class="type">
            COMISSAO TRANSACAO EMOLA
          </p>
        </div>
        <div class="valor">
          <p class="valor-m">-30,<span class="valor-mod
            ">00 MZN</span></p>
