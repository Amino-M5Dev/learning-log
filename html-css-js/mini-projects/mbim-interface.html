<!DOCTYPE html>
<html lang="en">
<head>
  <title>MBIM IZI</title>
  <link rel="stylesheet" href="./mbim.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="main-screen">

    <div class="information-card">

      <div class="menu-row-flex">
          <img class="menu-burger-icon" src="./menu-burger.png">
        <div class="profile-menu">
          <p class="profile-text">
            Olá,<br>
            <strong>ADMIN</strong>
          </p>
          <img class="profile-icon" src="./user.png">
        </div>
      </div>

      <div class="money-info">
        <p class="code-text">
          AAA BBB CCC DDD EEE FFF GGG
          <br>
          1234567890
        </p>
        <p class="total-money">
          99.999.999,99 <span class="total-currency">MZN</span>
        </p>
        <button class="move-btn">
          Ver movimentos
        </button>
      </div>

      <div class="secundary-card">
        <div class="card">
          <p class="card-text">
            OPTION A
          </p>
        </div>
        <div class="card">
          <p class="card-text">
            OPTION B
          </p>
        </div>
        <div class="card">
          <p class="card-text">
            OPTION C
          </p>
        </div>
        <div class="card">
          <p class="card-text">
            OPTION D
          </p>
        </div>
      </div>

      <div class="ad-section">
        <div class="ver-patrimonio">
          <img class="patrimonio-icon" src="./cloud-data.png">
          <p class="patrimonio-text">
            Ver Patrimonio
          </p>
        </div>
        <img class="ad-pic" src="./ad.jpeg" alt="">
      </div>

      <div class="extracto-card">
        <p class="data">
          Day, XX Month
        </p>
        <div class="transfer">
          <img class="transfer-icon" src="./send-money.png">
          <p class="type-transfer">
            OPERATION A
          </p>
          <p class="valor-moeda">-XX, <span class="valor-mod
            ">00 MZN</span></p>
        </div>
        <div class="transfer">
          <img class="transfer-icon" src="./send-money.png">
          <p class="type-transfer">
            OPERATION B
          </p>
          <p class="valor-moeda">-XX, <span class="valor-mod
            ">00 MZN</span></p>
        </div>
        <div class="transfer">
          <img class="transfer-icon" src="./send-money.png">
          <p class="type-transfer">
            OPERATION C
          </p>
          <p class="valor-moeda">-XX, <span class="valor-mod
            ">00 MZN</span></p>
        </div>
        
      </div>

      <div class="extracto-card">
        <p class="data">
          Day, XX Month
        </p>
        <div class="transfer">
          <img class="transfer-icon" src="./send-money.png">
          <p class="type-transfer">
            OPERATION A
          </p>
          <p class="valor-moeda">-XX, <span class="valor-mod
            ">00 MZN</span></p>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
